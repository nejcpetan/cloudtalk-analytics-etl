services:
  cloudtalk-etl:
    build:
      context: .
      args:
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
    container_name: cloudtalk-etl
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      - TZ=Europe/Ljubljana
    # Override command for one-off run: docker compose run cloudtalk-etl run
