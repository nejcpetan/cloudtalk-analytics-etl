services:
  cloudtalk-etl:
    build:
      context: .
      args:
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
    container_name: cloudtalk-etl
    restart: unless-stopped
    init: true
    environment:
      - CLOUDTALK_API_KEY_ID=${CLOUDTALK_API_KEY_ID}
      - CLOUDTALK_API_KEY_SECRET=${CLOUDTALK_API_KEY_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 2 * * *}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-50}
      - TZ=Europe/Ljubljana
    # Override command for one-off run: docker compose run --rm -e VAR=val cloudtalk-etl run
